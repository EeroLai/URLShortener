<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <main class="home-shell">
        <section class="home-card">
            <p class="eyebrow">URL Toolkit</p>
            <h1>Make long links clean and trackable</h1>
            <p class="subtext">Create a short link in one click, then manage all links from the dashboard.</p>

            <div class="input-row">
                <input id="input_url" type="text" placeholder="https://example.com/article/very-long-url">
                <button id="btn_send" type="button">Shorten</button>
            </div>

            <p id="form_message" class="message"></p>

            <div id="result_box" class="result hidden">
                <span>Short URL</span>
                <div class="result-row">
                    <a id="result_link" href="#" target="_blank" rel="noopener noreferrer"></a>
                    <button id="copy_btn" type="button">Copy</button>
                </div>
            </div>

            <a class="dashboard-link" href="/dashboard">Open Dashboard</a>
        </section>
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
